<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>당신을 위한 메시지</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>당신을 위한 메시지</h1>
        <div class="input-form">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" placeholder="당신의 이름을 알려주세요">
            </div>
            <div class="form-group">
                <label for="age">나이</label>
                <input type="number" id="age" placeholder="나이를 입력해주세요">
            </div>
            <div class="form-group">
                <label for="mood">오늘의 기분</label>
                <select id="mood">
                    <option value="happy">😄 행복해요</option>
                    <option value="sad">😢 슬퍼요</option>
                    <option value="anxious">😟 불안해요</option>
                    <option value="tired">😫 피곤해요</option>
                    <option value="angry">😠 화나요</option>
                </select>
            </div>
            <button id="generate-btn">메시지 받기</button>
        </div>
        <div id="message-display" class="message-container">
            <p>여기에 당신을 위한 메시지가 표시됩니다.</p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
