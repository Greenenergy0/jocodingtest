<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>휨불량 재작업 현황판</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>휨불량 재작업 현황판 (1/18 ~ 1/31)</h1>
        <div class="main-content">
            <div class="input-section">
                <h2>일일 데이터 입력</h2>
                <label for="date-select">날짜 선택:</label>
                <select id="date-select"></select>
                <div class="form-group">
                    <label for="initial-inventory">전일 재고:</label>
                    <input type="number" id="initial-inventory" placeholder="자동 계산" readonly>
                </div>
                <div class="form-group">
                    <label for="new-defects">신규 불량 발생:</label>
                    <input type="number" id="new-defects" min="0">
                </div>
                <div class="form-group">
                    <label for="reworked">작업량:</label>
                    <input type="number" id="reworked" min="0">
                </div>
                <button id="save-btn">저장</button>
                <button id="save-image-btn">이미지로 저장</button>
            </div>
            <div id="summary-section" class="stats-section">
                <h2>금일 통계</h2>
                <div class="stat-item">
                    <span>신규 불량:</span>
                    <span id="stat-new-defects">0</span>
                </div>
                <div class="stat-item">
                    <span>작업량:</span>
                    <span id="stat-reworked">0</span>
                </div>
                <div class="stat-item">
                    <span>금일 재고:</span>
                    <span id="stat-today-inventory">0</span>
                </div>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="inventory-chart"></canvas>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
